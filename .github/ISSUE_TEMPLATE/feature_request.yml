name: Feature request
description: Propose an API, compiler, runtime, or tooling improvement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Please explain the use case first.
        Requests that preserve the architectural direction are easier to evaluate.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the API, behavior, or workflow you want.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What have you tried or evaluated already?
  - type: textarea
    id: tradeoffs
    attributes:
      label: Tradeoffs
      description: Any performance, DX, compatibility, or complexity concerns.
