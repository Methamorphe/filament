name: Bug report
description: Report a reproducible bug in Filament.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug.
        Please include a minimal reproduction whenever possible.
  - type: input
    id: summary
    attributes:
      label: Summary
      description: One-sentence description of the problem.
      placeholder: Compiler crashes on nested TSX fragment with dynamic child.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Steps to reproduce the issue.
      placeholder: |
        1. Create a component with ...
        2. Run ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Node, pnpm, browser, and any relevant tooling versions.
    validations:
      required: true
